services:
  - type: web
    name: ai-career-twin-backend
    env: python
buildCommand: |
  pip install -r requirements.txt
  python -m spacy download en_core_web_sm    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
